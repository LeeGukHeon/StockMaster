policy_id: conservative_ops_policy
policy_version: v1
policy_name: Conservative Ops Policy
warn_ratio: 0.65
cleanup_ratio: 0.75
emergency_ratio: 0.85
stale_lock_minutes: 120
default_dry_run: true
log_compression_after_days: 1
high_frequency_blocked_jobs:
  - run_intraday_candidate_collector
  - sync_investor_flow
cleanup_allowlist:
  - data/raw
  - data/cache
  - data/logs
  - data/artifacts
  - data/curated/intraday/bar_1m
  - data/curated/intraday/trade_summary
  - data/curated/intraday/quote_summary
protected_prefixes:
  - data/curated
  - data/marts
