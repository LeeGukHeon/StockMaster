version: 1
disable_existing_loggers: false

formatters:
  structured:
    "()": app.logging.JsonFormatter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: structured
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: INFO
    formatter: structured
    filename: data/logs/app.log

root:
  level: INFO
  handlers:
    - console
    - file
