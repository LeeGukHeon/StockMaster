app:
  name: stockmaster
  display_name: KR Stock Research Platform v1
  env: local
  timezone: Asia/Seoul

paths:
  data_dir: ./data
  duckdb_path: ./data/marts/main.duckdb
  raw_dir: ./data/raw
  curated_dir: ./data/curated
  marts_dir: ./data/marts
  cache_dir: ./data/cache
  logs_dir: ./data/logs
  artifacts_dir: ./data/artifacts

logging:
  level: INFO
  filename: app.log

storage:
  warning_ratio: 0.70
  prune_ratio: 0.80
  limit_ratio: 0.90

providers:
  kis:
    base_url: https://openapi.koreainvestment.com:9443
    use_mock: false
  dart:
    base_url: https://opendart.fss.or.kr
  krx:
    base_url: https://data.krx.co.kr
    enabled_live: false
    allowed_services: []
    daily_request_budget: 1000
    request_timeout_seconds: 20.0
    source_attribution_label: 한국거래소 통계정보
    service_urls:
      stock_kospi_daily_trade: https://data-dbg.krx.co.kr/svc/apis/sto/stk_bydd_trd
      stock_kosdaq_daily_trade: https://data-dbg.krx.co.kr/svc/apis/sto/ksq_bydd_trd
      stock_kospi_symbol_master: https://data-dbg.krx.co.kr/svc/apis/sto/stk_isu_base_info
      stock_kosdaq_symbol_master: https://data-dbg.krx.co.kr/svc/apis/sto/ksq_isu_base_info
      index_krx_daily: https://data-dbg.krx.co.kr/svc/apis/idx/krx_dd_trd
      index_kospi_daily: https://data-dbg.krx.co.kr/svc/apis/idx/kospi_dd_trd
      index_kosdaq_daily: https://data-dbg.krx.co.kr/svc/apis/idx/kosdaq_dd_trd
      etf_daily_trade: https://data-dbg.krx.co.kr/svc/apis/etp/etf_bydd_trd
  naver_news:
    base_url: https://openapi.naver.com

discord:
  enabled: false
  username: KR Stock Research Bot
  bot_enabled: false
  bot_token:
  bot_application_id:
  bot_guild_id:

metadata:
  enabled: false
  backend: duckdb
  db_url:
  db_schema: public

model:
  default_horizons:
    - D1
    - D5
  uncertainty_lambda: 1.0
  disagreement_eta: 1.0
  implementation_kappa: 1.0
  regime_rho: 1.0

intraday_research:
  enabled: false
  assist_enabled: false
  postmortem_enabled: false
  policy_adjustment_enabled: false
  meta_model_enabled: false
  policy_auto_activation_enabled: false
  meta_model_auto_activation_enabled: false
  research_reports_enabled: false
  discord_summary_enabled: false
  writeback_enabled: false
  rollout_mode: RESEARCH_NON_TRADING
