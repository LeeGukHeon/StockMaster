name: ${DOCKER_COMPOSE_PROJECT_NAME:-stockmaster}

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ${STOCKMASTER_SERVER_IMAGE:-stockmaster-server:latest}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE_PATH:-./env/.env.server}
    environment:
      APP_ENV: ${APP_ENV:-server}
      APP_DATA_DIR: /workspace/data
      APP_DUCKDB_PATH: /workspace/data/marts/main.duckdb
      METADATA_DB_ENABLED: ${METADATA_DB_ENABLED:-true}
      METADATA_DB_BACKEND: ${METADATA_DB_BACKEND:-postgres}
      METADATA_DB_URL: ${METADATA_DB_URL:-}
      METADATA_DB_SCHEMA: ${METADATA_DB_SCHEMA:-public}
      PYTHONUNBUFFERED: "1"
    command:
      [
        "streamlit",
        "run",
        "app/ui/Home.py",
        "--server.address=${STREAMLIT_SERVER_ADDRESS:-0.0.0.0}",
        "--server.port=${STREAMLIT_SERVER_PORT:-8501}",
        "--server.headless=true",
        "--browser.gatherUsageStats=false",
      ]
    working_dir: /workspace
    volumes:
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/data/raw:/workspace/data/raw
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/data/curated:/workspace/data/curated
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/data/marts:/workspace/data/marts
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/data/cache:/workspace/data/cache
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/artifacts:/workspace/data/artifacts
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/logs/app:/workspace/data/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - stockmaster_net

  metadata_db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["metadata"]
    environment:
      POSTGRES_DB: ${METADATA_DB_POSTGRES_DB:-stockmaster_meta}
      POSTGRES_USER: ${METADATA_DB_POSTGRES_USER:-stockmaster}
      POSTGRES_PASSWORD: ${METADATA_DB_POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:${METADATA_DB_HOST_PORT:-5433}:5432"
    volumes:
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/metadata-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_POSTGRES_USER:-stockmaster} -d ${METADATA_DB_POSTGRES_DB:-stockmaster_meta}"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - stockmaster_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${PUBLIC_BIND_HOST:-0.0.0.0}:${PUBLIC_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STOCKMASTER_RUNTIME_ROOT:-/opt/stockmaster/runtime}/logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - stockmaster_net

networks:
  stockmaster_net:
    driver: bridge
